name: Compute Embeddings (1회성)

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Run embedding script on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            CLEAN_DB_URL=$(docker exec gowork-app printenv DATABASE_URL | tr -d '[:space:]')
            docker exec -e DATABASE_URL="$CLEAN_DB_URL" gowork-app python scripts/compute_embeddings.py
