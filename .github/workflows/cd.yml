name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Docker 이미지 강제 재빌드 (의존성 변경 시에만 필요)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── 의존성 변경 여부 확인 ───────────────────────────────────────
      - name: Check if Docker rebuild needed
        id: deps-check
        run: |
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "강제 재빌드 요청"
          elif git diff HEAD~1 HEAD -- Dockerfile pyproject.toml poetry.lock | grep -q .; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "의존성/Dockerfile 변경 감지 → 이미지 재빌드"
          else
            echo "rebuild=false" >> $GITHUB_OUTPUT
            echo "소스코드만 변경 → 이미지 재빌드 생략"
          fi

      # ── AWS 인증 ────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── ECR 로그인 ──────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker 빌드 & ECR Push (의존성 변경 시에만) ──────────────────
      - name: Build and push Docker image
        if: steps.deps-check.outputs.rebuild == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ── EC2 디렉토리 준비 ───────────────────────────────────────────
      - name: Prepare EC2 app directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p /home/ubuntu/gowork-app

      # ── 소스코드 EC2로 복사 ──────────────────────────────────────────
      - name: Copy source code to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "agent/,backend/,scripts/,frontend/build/web/"
          target: "/home/ubuntu/gowork-app"

      # ── EC2 배포 ────────────────────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          REBUILD: ${{ steps.deps-check.outputs.rebuild }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,AWS_REGION,DATABASE_URL,GROQ_API_KEY,API_BASE_URL,REBUILD
          script: |
            DATABASE_URL=$(echo "$DATABASE_URL" | tr -d '\n\r')
            GROQ_API_KEY=$(echo "$GROQ_API_KEY" | tr -d '\n\r')
            API_BASE_URL=$(echo "$API_BASE_URL" | tr -d '\n\r')
            IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:latest"
            APP_DIR="/home/ubuntu/gowork-app"

            CONTAINER_RUNNING=$(docker ps -q -f name=gowork-app)

            if [ "$REBUILD" = "true" ] || [ -z "$CONTAINER_RUNNING" ]; then
              echo "▶ Docker 이미지 교체 배포"
              docker image prune -f || true
              aws ecr get-login-password --region "$AWS_REGION" | \
                docker login --username AWS --password-stdin "$ECR_REGISTRY"
              docker pull "$IMAGE"
              docker stop gowork-app || true
              docker rm gowork-app || true
              docker run -d \
                --name gowork-app \
                --restart unless-stopped \
                -p 8000:8000 \
                -v "$APP_DIR/agent:/app/agent" \
                -v "$APP_DIR/backend:/app/backend" \
                -v "$APP_DIR/scripts:/app/scripts" \
                -v "$APP_DIR/frontend/build/web:/app/frontend/build/web" \
                -e DATABASE_URL="$DATABASE_URL" \
                -e GROQ_API_KEY="$GROQ_API_KEY" \
                -e API_BASE_URL="$API_BASE_URL" \
                -e PYTHONUNBUFFERED=1 \
                --log-driver awslogs \
                --log-opt awslogs-region="$AWS_REGION" \
                --log-opt awslogs-group=/gowork/app \
                --log-opt awslogs-create-group=true \
                "$IMAGE"
            else
              echo "▶ 소스코드 변경 → 재시작"
              docker restart gowork-app
            fi

            sleep 10
            docker ps | grep gowork-app && echo "✓ 배포 완료" || (echo "✗ 배포 실패" && exit 1)
