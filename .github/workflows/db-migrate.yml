name: DB Migration

on:
  workflow_dispatch:
    inputs:
      sql:
        description: '실행할 SQL (여러 줄 가능)'
        required: true
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Run SQL on EC2
        uses: appleboy/ssh-action@v1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SQL: ${{ inputs.sql }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DATABASE_URL,SQL
          script: |
            DATABASE_URL=$(echo "$DATABASE_URL" | tr -d '\n\r')
            echo "▶ Running migration..."
            echo "$SQL" | psql "$DATABASE_URL"
            echo "✓ Done"
