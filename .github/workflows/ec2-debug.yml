name: EC2 Debug & Recovery

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Check and recover EC2
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,AWS_REGION,DATABASE_URL,GROQ_API_KEY,API_BASE_URL
          command_timeout: 5m
          script: |
            echo "===== 디스크 상태 ====="
            df -h

            echo "===== 컨테이너 상태 ====="
            docker ps -a | grep gowork || echo "gowork-app 컨테이너 없음"

            echo "===== 최근 로그 ====="
            docker logs gowork-app --tail 30 2>&1 || echo "로그 없음"

            echo "===== 복구 시작 ====="
            DATABASE_URL=$(echo "$DATABASE_URL" | tr -d '\n\r')
            GROQ_API_KEY=$(echo "$GROQ_API_KEY" | tr -d '\n\r')
            API_BASE_URL=$(echo "$API_BASE_URL" | tr -d '\n\r')

            docker system prune -af --volumes || true

            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY"

            docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

            docker stop gowork-app || true
            docker rm gowork-app || true

            docker run -d \
              --name gowork-app \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DATABASE_URL="$DATABASE_URL" \
              -e GROQ_API_KEY="$GROQ_API_KEY" \
              -e API_BASE_URL="$API_BASE_URL" \
              -e PYTHONUNBUFFERED=1 \
              --log-driver awslogs \
              --log-opt awslogs-region="$AWS_REGION" \
              --log-opt awslogs-group=/gowork/app \
              --log-opt awslogs-create-group=true \
              "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

            sleep 15
            echo "===== 복구 후 상태 ====="
            docker ps | grep gowork-app
